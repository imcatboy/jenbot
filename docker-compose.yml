services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - jenbot_pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=4MB
      -c maintenance_work_mem=16MB
    deploy:
      resources:
        limits:
          memory: 200M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 150mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - jenbot_redisdata:/data
    deploy:
      resources:
        limits:
          memory: 200M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 100M
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./alembic/versions:/app/alembic/versions
    entrypoint: ["alembic"]
    command: ["current"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m api.main
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_challenge:/etc/nginx/conf.d:ro
      - ./web/base/dist:/usr/share/nginx/html:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_var:/var/lib/letsencrypt:ro
      - certbot_challenge:/var/www/certbot:ro
    deploy:
      resources:
        limits:
          memory: 50M
    depends_on:
      - api
    restart: unless-stopped
  
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_challenge:/var/www/certbot
    deploy:
      resources:
        limits:
          memory: 30M
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  jenbot_pgdata:
  jenbot_redisdata:
  certbot_etc:
  certbot_var:
  certbot_challenge:

x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"
  driver: json-file